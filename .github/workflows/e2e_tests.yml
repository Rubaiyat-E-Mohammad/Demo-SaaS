name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel superseded runs on the same branch — saves CI minutes when commits
# land rapidly during review iterations.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (chromium) shard ${{ matrix.shard }} / ${{ strategy.job-total }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Spec count = 7 (sign-in, dashboard, ticketDetail, newTicket,
        # organizationSettings, manageAccount, navigation). Playwright shards
        # by spec file atomically — 4 shards × ~2 specs/shard is the sweet
        # spot: short wall time without burning a runner per spec. Bump to
        # match spec count whenever you add a new spec file.
        shard: [1, 2, 3, 4]
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright browser (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Verify required secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SIGNIN_EMAIL: ${{ secrets.SIGNIN_EMAIL }}
          SIGNIN_PASSWORD: ${{ secrets.SIGNIN_PASSWORD }}
        run: |
          missing=()
          [[ -z "$BASE_URL" ]] && missing+=("BASE_URL")
          [[ -z "$SIGNIN_EMAIL" ]] && missing+=("SIGNIN_EMAIL")
          [[ -z "$SIGNIN_PASSWORD" ]] && missing+=("SIGNIN_PASSWORD")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}. Set them in Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "All required secrets present."

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SIGNIN_EMAIL: ${{ secrets.SIGNIN_EMAIL }}
          SIGNIN_PASSWORD: ${{ secrets.SIGNIN_PASSWORD }}
        # `--reporter=blob` writes a per-shard blob that the merge job below
        # combines into a single HTML report. The feature-map reporter runs
        # in addition (it appends to $GITHUB_STEP_SUMMARY).
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }} --reporter=blob,./utils/featureMapReporter.ts

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: e2e/blob-report
          retention-days: 3

  merge-reports:
    name: Merge sharded HTML reports
    if: ${{ !cancelled() }}
    needs: e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v6
        with:
          path: e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload combined HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 3
