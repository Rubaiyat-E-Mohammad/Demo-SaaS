name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E (chromium)
    runs-on: ubuntu-latest
    # Auth tests run serially with rate-limit cooldown gaps + up to 2 retries;
    # 60 min leaves headroom over the worst-case serial auth path.
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify required secrets
        env:
          SIGNIN_EMAIL: ${{ secrets.SIGNIN_EMAIL }}
          SIGNIN_PASSWORD: ${{ secrets.SIGNIN_PASSWORD }}
        run: |
          missing=()
          [[ -z "$SIGNIN_EMAIL" ]] && missing+=("SIGNIN_EMAIL")
          [[ -z "$SIGNIN_PASSWORD" ]] && missing+=("SIGNIN_PASSWORD")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}. Set them in Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "All required secrets present."

      - name: Run Playwright tests
        env:
          # Headless CI run; the singleBrowser helper reads HEADLESS.
          HEADLESS: '1'
          # Sign-in credentials — set these in the repo's
          # Settings > Secrets and variables > Actions.
          SIGNIN_EMAIL: ${{ secrets.SIGNIN_EMAIL }}
          SIGNIN_PASSWORD: ${{ secrets.SIGNIN_PASSWORD }}
        # The feature-map reporter appends the test summary to
        # $GITHUB_STEP_SUMMARY, so it renders on the run page.
        run: npx playwright test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
